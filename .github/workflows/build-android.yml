name: Build Solar Dashboard

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/local/bin/gradle
          gradle --version | head -3

      - name: Install Android SDK platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -3
          echo "SDK ready"

      - name: Install Pillow
        run: pip install Pillow --break-system-packages -q

      - name: Prepare Keystore from secret
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 -d > $HOME/solar.keystore
          echo "Keystore size: $(wc -c < $HOME/solar.keystore) bytes"
          echo "================================================"
          echo "SHA-256 FINGERPRINT"
          echo "================================================"
          keytool -list -v -keystore $HOME/solar.keystore -storepass solar2024 2>&1 | grep "SHA256:" || echo "Could not read keystore"
          echo "================================================"

      - name: Generate Android project
        run: python3 $GITHUB_WORKSPACE/build-twa.py

      - name: Build APK
        run: |
          cd $HOME/twa
          gradle assembleRelease --no-daemon 2>&1
          echo "APK exit: $?"

      - name: Build AAB
        if: success()
        run: |
          cd $HOME/twa
          gradle bundleRelease --no-daemon 2>&1 | tail -10
          echo "AAB exit: $?"

      - name: List outputs
        if: always()
        run: |
          echo "=== APK ===" && find $HOME/twa -name "*.apk" 2>/dev/null || echo "none"
          echo "=== AAB ===" && find $HOME/twa -name "*.aab" 2>/dev/null || echo "none"

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find $HOME/twa -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          find $HOME/twa -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          cp $HOME/solar.keystore $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          base64 -w 0 $HOME/solar.keystore > $GITHUB_WORKSPACE/output/solar.keystore.b64 2>/dev/null || true
          echo "=== Output files ==="
          ls -lh $GITHUB_WORKSPACE/output/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-android
          path: output/
          retention-days: 30
