name: Build Solar Dashboard
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prep Keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /home/runner/solar.keystore

      - name: Run Script
        run: python3 build-twa.py

      - name: Setup Resources
        run: |
          mkdir -p /home/runner/twa/app/src/main/res/mipmap-mdpi
          wget https://dumitriualx-lang.github.io/solar-dashboard/icons/icon-48.png -O /home/runner/twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Build APK (using system gradle)
        run: |
          cd /home/runner/twa
          # We use 'gradle' instead of './gradlew'
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-v25
          path: /home/runner/twa/app/build/outputs/apk/release/*.apk
