name: Build Solar Dashboard
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Prep Keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /home/runner/solar.keystore
      - name: Generate Project
        run: python3 build-twa.py
      - name: Build
        run: |
          cd /home/runner/twa
          wget https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradlew -O gradlew
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: solar-apk
          path: /home/runner/twa/app/build/outputs/apk/release/*.apk
