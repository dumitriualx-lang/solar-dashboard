name: Build Android TWA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install SDK platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -5
          echo "SDK done"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -keystore $HOME/solar.keystore -alias solar-key -keyalg RSA -keysize 2048 -validity 10000 -storepass solar2024 -keypass solar2024 -dname "CN=Solar Dashboard,O=SolarApp,C=RO" -noprompt
          echo "Keystore created"

      - name: Generate Android project files
        run: python3 $GITHUB_WORKSPACE/build-twa.py

      - name: Build APK
        run: |
          cd $HOME/twa
          gradle assembleRelease --no-daemon --stacktrace 2>&1
          echo "Exit code: $?"

      - name: Build AAB
        run: |
          cd $HOME/twa
          gradle bundleRelease --no-daemon 2>&1 | tail -20
          echo "Exit code: $?"

      - name: List all build outputs
        run: |
          echo "=== All APK files ==="
          find $HOME/twa -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== All AAB files ==="
          find $HOME/twa -name "*.aab" 2>/dev/null || echo "No AAB found"
          echo "=== Build output dir ==="
          find $HOME/twa/app/build/outputs 2>/dev/null || echo "No outputs dir"

      - name: Collect outputs
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find $HOME/twa -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          find $HOME/twa -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          cp $HOME/solar.keystore $GITHUB_WORKSPACE/output/
          echo "=== Final output files ==="
          ls -lh $GITHUB_WORKSPACE/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-android
          path: output/
          retention-days: 30
