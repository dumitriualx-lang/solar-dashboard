name: Build and Sign Solar Dashboard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Removed 'cache: gradle' to prevent the "No file matched" error

      - name: Prepare Keystore File
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /home/runner/solar.keystore
          # Verify it exists
          ls -l /home/runner/solar.keystore

      - name: Run TWA Build Script
        run: python3 build-twa.py

      - name: Build Signed APK and AAB
        run: |
          cd /home/runner/twa
          # Ensure the wrapper script we just generated is executable
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload Signed Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-FINAL-RELEASE
          path: |
            /home/runner/twa/app/build/outputs/apk/release/*.apk
            /home/runner/twa/app/build/outputs/bundle/release/*.aab
