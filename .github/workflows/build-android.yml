name: Build and Sign Solar Dashboard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -d /opt/gradle gradle-8.7-bin.zip
          sudo ln -s /opt/gradle/gradle-8.7/bin/gradle /usr/local/bin/gradle

      - name: Run TWA Build Script
        run: |
          python3 build-twa.py
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk

      - name: Build APK and AAB
        run: |
          cd $HOME/twa
          gradle assembleRelease bundleRelease --no-daemon

      - name: Prepare Signing Key
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > $HOME/release.keystore

      - name: Sign APK (Manual)
        run: |
          BUILD_TOOLS=$HOME/android-sdk/build-tools/34.0.0
          APK_PATH=$HOME/twa/app/build/outputs/apk/release/app-release-unsigned.apk
          # If the above path is wrong, it might be app-release.apk
          [ -f $APK_PATH ] || APK_PATH=$HOME/twa/app/build/outputs/apk/release/app-release.apk
          
          $BUILD_TOOLS/apksigner sign --ks $HOME/release.keystore \
            --ks-key-alias solar-key \
            --ks-pass pass:solar2024 \
            --key-pass pass:solar2024 \
            --out $HOME/solar-signed.apk $APK_PATH

      - name: Sign AAB (Manual)
        run: |
          AAB_PATH=$HOME/twa/app/build/outputs/bundle/release/app-release.aab
          jarsigner -keystore $HOME/release.keystore \
            -storepass solar2024 \
            -keypass solar2024 \
            $AAB_PATH solar-key
          mv $AAB_PATH $HOME/solar-signed.aab

      - name: Upload FINAL Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-FINAL-RELEASE
          path: |
            $HOME/solar-signed.apk
            $HOME/solar-signed.aab

      - name: Upload Keystore (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solar-keystore
          path: $HOME/release.keystore
