name: Build Solar Dashboard
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /home/runner/solar.keystore

      - name: Run Project Generator
        run: python3 build-twa.py

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2
      
      - name: Install Pillow
        run: pip install Pillow --break-system-packages -q

      - name: Generate Android project
        run: python3 $GITHUB_WORKSPACE/build-twa.py

      - name: Build APK and AAB
        run: |
          cd /home/runner/twa
          gradle bundleRelease assembleRelease --no-daemon

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-dist-v51
          path: |
            /home/runner/twa/app/build/outputs/apk/release/*.apk
            /home/runner/twa/app/build/outputs/bundle/release/*.aab
