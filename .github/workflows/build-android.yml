name: Build Solar Dashboard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > $HOME/solar.keystore

      - name: Run Python script
        run: python3 build-twa.py

      # ✅ FIXED ICON (change filename if needed)
      - name: Add icon
        run: |
          mkdir -p $HOME/twa/app/src/main/res/mipmap-mdpi
          wget https://dumitriualx-lang.github.io/icons/icon-192.png \
          -O $HOME/twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

      # ✅ CRITICAL FIX (Gradle version)
      - name: Generate Gradle Wrapper
        run: |
          cd $HOME/twa
          gradle wrapper --gradle-version 8.2

      - name: Build AAB + APK
        run: |
          cd $HOME/twa
          ./gradlew bundleRelease
          ./gradlew assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard
          path: |
            $HOME/twa/app/build/outputs/**/*.apk
            $HOME/twa/app/build/outputs/**/*.aab
