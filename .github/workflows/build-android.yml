name: Build and Sign Solar Dashboard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.7
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          sudo unzip -d /opt/gradle gradle-8.7-bin.zip
          sudo ln -s /opt/gradle/gradle-8.7/bin/gradle /usr/local/bin/gradle

      - name: Prepare Keystore File
        # This matches the KEYSTORE path in your Python script: os.path.join(HOME, "solar.keystore")
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > $HOME/solar.keystore

      - name: Run TWA Build Script
        run: python3 build-twa.py
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk

      - name: Build Signed APK and AAB
        # Because your Python script adds 'signingConfig' to build.gradle,
        # these commands will produce SIGNED files automatically.
        run: |
          cd $HOME/twa
          gradle assembleRelease bundleRelease --no-daemon

      - name: Upload Signed Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-FINAL-RELEASE
          path: |
            /home/runner/twa/app/build/outputs/apk/release/*.apk
            /home/runner/twa/app/build/outputs/bundle/release/*.aab

      - name: Upload Keystore (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solar-keystore
          path: /home/runner/solar.keystore
