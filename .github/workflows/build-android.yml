name: Build Android TWA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          sudo ln -sf /opt/gradle-8.7/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Install SDK platforms
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -5
          echo "SDK done"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -keystore $HOME/solar.keystore -alias solar-key -keyalg RSA -keysize 2048 -validity 10000 -storepass solar2024 -keypass solar2024 -dname "CN=Solar Dashboard,O=SolarApp,C=RO" -noprompt
          echo "Keystore created"

      - name: Generate Android project files
        run: python3 $GITHUB_WORKSPACE/build-twa.py

      - name: Build APK
        run: |
          cd $HOME/twa
          gradle assembleRelease --no-daemon 2>&1
          echo "Exit: $?"

      - name: Build AAB
        if: success()
        run: |
          cd $HOME/twa
          gradle bundleRelease --no-daemon 2>&1 | tail -20

      - name: List outputs
        if: always()
        run: |
          echo "=== APK ===" && find $HOME/twa -name "*.apk" 2>/dev/null || echo "none"
          echo "=== AAB ===" && find $HOME/twa -name "*.aab" 2>/dev/null || echo "none"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: /home/runner/twa/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: solar-key
          keyStorePassword: solar2024
          keyPassword: solar2024

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find $HOME/twa -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          find $HOME/twa -name "*.aab" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          cp $HOME/solar.keystore $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          ls -lh $GITHUB_WORKSPACE/output/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-android
          path: output/
          retention-days: 30
