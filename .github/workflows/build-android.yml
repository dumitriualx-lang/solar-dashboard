name: Build Solar Dashboard
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Keystore
        run: echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /home/runner/solar.keystore

      - name: Run Project Generator
        run: python3 build-twa.py

      - name: Setup App Icon
        run: |
          # Create the icon directory inside the generated project
          mkdir -p /home/runner/twa/app/src/main/res/mipmap-mdpi
          # Download the icon from your hosted site
          wget https://dumitriualx-lang.github.io/solar-dashboard/icons/icon-48.png -O /home/runner/twa/app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build Signed APK
        run: |
          cd /home/runner/twa
          gradle assembleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-dashboard-v45
          path: /home/runner/twa/app/build/outputs/apk/release/*.apk
