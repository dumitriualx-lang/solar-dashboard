<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Solar Dashboard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Solar Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--g:#1D9E75;--gl:rgba(29,158,117,.13);--am:#BA7517;--aml:rgba(186,117,23,.13);--rd:#A32D2D;--rdl:rgba(163,45,45,.13);--bl:#378ADD;--bll:rgba(55,138,221,.18);--or:#D85A30;--bg:#f4f4f0;--sf:#fff;--sf2:#f0efe9;--br:rgba(0,0,0,.09);--tx:#1a1a1a;--t2:#666;--t3:#aaa;--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111;--sf:#1c1c1a;--sf2:#252523;--br:rgba(255,255,255,.09);--tx:#f0efe9;--t2:#aaa;--t3:#555}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
.hdr{background:var(--g);color:#fff;padding:44px 16px 14px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:17px;font-weight:700}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr-sub{font-size:10px;opacity:.8;margin-top:2px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.5s infinite}
.hdr-stats{display:flex;gap:14px;margin-top:10px;font-size:11px;opacity:.9;flex-wrap:wrap}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.body{padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.card{background:var(--sf);border-radius:var(--r);border:.5px solid var(--br);padding:14px}
.ct{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:none;letter-spacing:0}
.p-ok{background:var(--gl);color:#0F6E56}.p-warn{background:var(--aml);color:#854F0B}.p-info{background:var(--bll);color:#185FA5}.p-err{background:var(--rdl);color:var(--rd)}
.gps-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--rs);font-size:10px;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.gps-ok{background:var(--gl);color:#0F6E56}.gps-req{background:var(--bll);color:#185FA5}.gps-err{background:var(--aml);color:#854F0B}
.gps-btn{background:none;border:.5px solid currentColor;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:inherit;white-space:nowrap}
.api-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--rs);font-size:10px;margin-bottom:10px;gap:8px}
.api-ok{background:var(--gl);color:#0F6E56}.api-err{background:var(--aml);color:#854F0B}.api-load{background:var(--bll);color:#185FA5}
.api-refresh{background:none;border:.5px solid currentColor;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:inherit;white-space:nowrap}
.cons-card{background:var(--sf);border-radius:var(--r);border:2px solid var(--g);padding:14px}
.cons-label{font-size:10px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.cons-row{display:flex;align-items:center;gap:10px}
.cons-inp-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--sf2);border-radius:var(--rs);padding:8px 14px;border:.5px solid var(--br)}
.cons-inp-wrap input{flex:1;background:none;border:none;outline:none;font-size:24px;font-weight:700;color:var(--tx);width:100%;font-family:inherit;text-align:right}
.cons-unit{font-size:13px;font-weight:600;color:var(--t2)}
.cons-hint{font-size:10px;color:var(--t2);margin-top:5px}
.log-btn{background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mc{background:var(--sf);border-radius:var(--r);border:.5px solid var(--br);padding:12px}
.mc.wide{grid-column:span 2}
.mc-lbl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.mc-val{font-size:22px;font-weight:700;line-height:1}
.mc-sub{font-size:10px;color:var(--t2);margin-top:4px;line-height:1.3}
.cg{color:var(--g)!important}.ca{color:var(--am)!important}.cr{color:var(--rd)!important}.cb{color:var(--bl)!important}
.irr-bar{height:6px;border-radius:3px;background:var(--sf2);margin:8px 0 4px;overflow:hidden}
.irr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#EF9F27,#1D9E75);transition:width .8s ease}
.flow{display:grid;grid-template-columns:1fr 40px 1fr;align-items:center}
.fnode{background:var(--sf2);border-radius:var(--rs);padding:10px 8px;text-align:center;border:.5px solid var(--br)}
.fic{font-size:19px}.flb{font-size:9px;color:var(--t2);margin-top:2px}
.fvl{font-size:13px;font-weight:700;margin-top:2px}
.wstrip{display:flex;gap:4px;margin-bottom:10px}
.wd{flex:1;text-align:center;padding:6px 2px;border-radius:var(--rs);background:var(--sf2)}
.wd.today{background:var(--gl);border:.5px solid var(--g)}
.wi{font-size:14px}.wn{font-size:9px;color:var(--t2);margin:2px 0}
.wt{font-size:10px;font-weight:600;color:var(--tx)}
.sched{display:flex;flex-direction:column;gap:6px}
.si{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);background:var(--sf2)}
.snm{font-size:12px;font-weight:600;color:var(--tx)}
.chart-wrap{position:relative;width:100%;height:175px}.chart-sm{position:relative;width:100%;height:150px}
.leg{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.lbr{width:9px;height:9px;display:inline-block;border-radius:2px}
.tabs{display:flex;gap:2px;background:var(--sf2);padding:3px;border-radius:var(--rs);margin-bottom:10px}
.tab{flex:1;padding:5px;text-align:center;font-size:11px;border-radius:6px;cursor:pointer;color:var(--t2);border:none;background:transparent}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:.5px solid var(--br);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;gap:3px;font-size:9px;color:var(--t3);border:none;background:none}
.nb.on{color:var(--g)}.ni{font-size:20px}
.page{display:none}.page.on{display:block}
.inst{background:var(--g);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px}
.inst button{background:rgba(255,255,255,.22);border:none;color:#fff;padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cfg-group{display:flex;flex-direction:column;gap:3px}
.cfg-lbl{font-size:10px;color:var(--t2);font-weight:600}
.cfg-inp-wrap{display:flex;align-items:center;gap:6px;background:var(--sf2);border-radius:var(--rs);padding:7px 12px;border:.5px solid var(--br)}
.cfg-inp-wrap input{flex:1;background:none;border:none;outline:none;font-size:18px;font-weight:700;color:var(--tx);width:100%;text-align:right}
.cfg-unit{font-size:11px;font-weight:600;color:var(--t2)}
.cfg-save{background:var(--g);color:#fff;border:none;border-radius:var(--rs);padding:8px;font-size:12px;font-weight:700;width:100%;margin-top:4px}
.mfr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mfr-select{width:100%;padding:7px 10px;font-size:12px;font-weight:600;background:var(--sf2);color:var(--tx);border:.5px solid var(--br);border-radius:var(--rs)}
.notif-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;margin-bottom:10px;gap:10px}
.notif-ok{background:var(--gl);color:#0F6E56}
.notif-off{background:var(--sf2);color:var(--t2)}
.notif-btn{background:none;border:1.5px solid currentColor;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;color:inherit}
.grid-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.grid-stat{text-align:center;padding:10px 6px;border-radius:var(--rs);background:var(--sf2)}
.gs-val{font-size:20px;font-weight:700}
.grid-flow-bar{height:8px;border-radius:4px;background:var(--sf2);overflow:hidden;margin:8px 0 4px;position:relative}
.grid-flow-fill{position:absolute;top:0;bottom:0;border-radius:4px;transition:all .6s ease}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>☀️ Solar Dashboard</h1>
      <div class="hdr-sub" id="hdrSub"><span id="clk">--:--:--</span></div>
    </div>
    <div class="live-pill"><div class="live-dot"></div><span id="liveTag">Live</span></div>
  </div>
  <div class="hdr-stats">
    <span id="hdrPv">☀️ -- kW</span>
    <span id="hdrBatt">🔋 --%</span>
    <span id="hdrWx">🌡️ --°C</span>
  </div>
</div>

<div class="body">
<div id="pgDash" class="page on">
  <div class="gps-bar gps-req" id="gpsBar">
    <span id="gpsMsg">📍 Requesting location...</span>
    <button class="gps-btn" onclick="requestLocation()">Allow GPS</button>
  </div>

  <div class="api-bar api-load" id="apiBar">
    <span id="apiMsg">⏳ Awaiting GPS fix...</span>
    <button class="api-refresh" onclick="fetchWeather()">Refresh</button>
  </div>

  <div class="notif-bar notif-off" id="notifBar">
    <span id="notifMsg">🔔 Enable notifications for solar alerts</span>
    <button class="notif-btn" onclick="requestNotifPermission()" id="notifBtn">Enable</button>
  </div>

  <div class="card">
    <div class="ct">⚙️ System configuration</div>
    <div class="mfr-grid">
      <select class="mfr-select" id="cfgPanelBrand"><option value="">— Panel Brand —</option><option value="huawei">Huawei</option></select>
      <select class="mfr-select" id="cfgBattBrand"><option value="">— Battery Brand —</option><option value="huawei_5">Huawei 5kWh</option></select>
    </div>
    <div class="cfg-grid">
       <div class="cfg-group"><div class="cfg-lbl">☀️ Panels (kW)</div><div class="cfg-inp-wrap"><input type="number" id="cfgPanel" value="5"></div></div>
       <div class="cfg-group"><div class="cfg-lbl">🔋 Battery (kWh)</div><div class="cfg-inp-wrap"><input type="number" id="cfgBatt" value="5"></div></div>
    </div>
    <button class="cfg-save" onclick="saveCfgAndApply()">💾 Save Settings</button>
  </div>

  <div class="cons-card">
    <div class="cons-label">🏠 Home consumption (kW)</div>
    <div class="cons-row">
      <div class="cons-inp-wrap"><input type="number" id="iCons" value="0.48" step="0.1"></div>
      <button class="log-btn">Log ↗</button>
    </div>
  </div>

  <div class="metrics">
    <div class="mc"><div class="mc-lbl">Solar Output</div><div class="mc-val cg" id="mv0">-- kW</div></div>
    <div class="mc"><div class="mc-lbl">Battery Flow</div><div class="mc-val" id="mv2">-- kW</div></div>
  </div>
</div>
</div>

<nav class="nav">
  <button class="nb on" onclick="showPage('Dash',this)"><span class="ni">⚡</span>Dash</button>
  <button class="nb" onclick="showPage('Forecast',this)"><span class="ni">📅</span>Forecast</button>
</nav>

<script>
// 1. CRITICAL: DEFINE GLOBALS FIRST
window.notifTimers = {};

// ═══════════════════════════════════════════════════════════════
// STATE & CONFIG
// ═══════════════════════════════════════════════════════════════
const CFG_KEY = 'solarSysConfig';
let ST = {
  lat: null, lon: null, gpsOk: false,
  pvKw: 0, irrWm2: 0, apiOk: false,
  battSoc: 84, consKw: 0.48
};

function saveCfgAndApply() {
  localStorage.setItem(CFG_KEY, JSON.stringify({
    panelKw: document.getElementById('cfgPanel').value,
    battGross: document.getElementById('cfgBatt').value
  }));
  alert("Settings Saved!");
}

// ═══════════════════════════════════════════════════════════════
// GPS LOGIC (RE-WRITTEN & COMPLETED)
// ═══════════════════════════════════════════════════════════════
function requestLocation() {
  if (!navigator.geolocation) {
    setGpsErr("GPS not supported");
    return;
  }
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      applyPosition(pos);
    },
    (err) => {
      document.getElementById('gpsMsg').innerText = "❌ GPS Denied. Please enable in settings.";
      document.getElementById('gpsBar').className = "gps-bar gps-err";
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function applyPosition(pos) {
  ST.lat = pos.coords.latitude;
  ST.lon = pos.coords.longitude;
  ST.gpsOk = true;
  document.getElementById('gpsBar').className = "gps-bar gps-ok";
  document.getElementById('gpsMsg').innerText = `📍 Location: ${ST.lat.toFixed(2)}, ${ST.lon.toFixed(2)}`;
  fetchWeather(); 
}

// ═══════════════════════════════════════════════════════════════
// WEATHER API (OPEN-METEO)
// ═══════════════════════════════════════════════════════════════
async function fetchWeather() {
  if (!ST.gpsOk) return;
  document.getElementById('apiMsg').innerText = "⏳ Fetching weather...";
  
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${ST.lat}&longitude=${ST.lon}&current=temperature_2m,shortwave_radiation&timezone=auto`;
    const resp = await fetch(url);
    const data = await resp.json();
    
    const irr = data.current.shortwave_radiation;
    ST.irrWm2 = irr;
    ST.apiOk = true;
    
    // Simple solar calc: Irradiance * efficiency * panel size
    ST.pvKw = (irr / 1000) * 0.8 * document.getElementById('cfgPanel').value;
    
    document.getElementById('apiBar').className = "api-bar api-ok";
    document.getElementById('apiMsg').innerText = "✅ Connection Stable";
    document.getElementById('mv0').innerText = ST.pvKw.toFixed(2) + " kW";
    
  } catch (e) {
    document.getElementById('apiMsg').innerText = "❌ Connection Error";
  }
}

// ═══════════════════════════════════════════════════════════════
// NOTIFICATIONS (FIXED BUTTON)
// ═══════════════════════════════════════════════════════════════
async function requestNotifPermission() {
  const permission = await Notification.requestPermission();
  const btn = document.getElementById('notifBtn');
  const bar = document.getElementById('notifBar');
  
  if (permission === "granted") {
    bar.className = "notif-bar notif-ok";
    document.getElementById('notifMsg').innerText = "🔔 Notifications active!";
    btn.style.display = "none";
    
    new Notification("Solar Dashboard", { 
      body: "Test Successful! Alerts are now active.",
      icon: "icons/icon-192.png" 
    });
  } else {
    alert("Permission denied. Enable in Phone Settings.");
  }
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pg' + id).classList.add('on');
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

setInterval(() => {
  document.getElementById('clk').innerText = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
